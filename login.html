<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | FAM-TREE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- Base Styles --- */
        :root { --primary: #2d5a27; --dark: #1e3d1a; --light: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(rgba(45, 90, 39, 0.8), rgba(30, 61, 26, 0.9)), 
                        url('https://images.unsplash.com/photo-1511895426328-dc8714191300?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- Login Card --- */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-header i { font-size: 3rem; color: var(--primary); margin-bottom: 10px; }
        .login-header h2 { font-weight: 800; color: var(--dark); margin-bottom: 5px; }
        .login-header p { color: #666; font-size: 0.9rem; margin-bottom: 30px; }

        /* --- Form Elements --- */
        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa; }
        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(45, 90, 39, 0.1); }

        /* --- Buttons --- */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:active { transform: scale(0.98); }

        .forgot-pass { display: block; margin-top: 15px; color: #666; font-size: 0.85rem; text-decoration: none; }
        
        .divider { margin: 30px 0; border-top: 1px solid #eee; position: relative; }
        .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; color: #999; font-size: 0.8rem; }

        .btn-register {
            display: inline-block;
            width: 100%;
            padding: 12px;
            border: 2px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-register:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <i class="fa-solid fa-sitemap"></i>
            <h2>Welcome Back</h2>
            <p>Enter your details to view the tree</p>
        </div>

        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
            <a href="#" class="forgot-pass">Forgot Password?</a>
        </form>

        <div class="divider"><span>OR</span></div>

        <a href="signup.html" class="btn-register">Join the Family</a>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            // Simulate login and redirect to feed
            window.location.href = 'feed.html';
        }
    </script>
</body>
</html>
