<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join the Family | FAM-TREE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2d5a27; --dark: #1e3d1a; --bg-overlay: rgba(30, 61, 26, 0.85); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .reg-card {
            background: rgba(255, 255, 255, 0.98);
            width: 100%; max-width: 450px;
            padding: 30px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .reg-header h2 { font-weight: 800; color: var(--dark); font-size: 1.6rem; }
        .reg-header p { color: #666; font-size: 0.9rem; margin: 10px 0 25px; }

        /* --- Form Styling --- */
        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 38px; color: #888; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--dark); margin-bottom: 5px; margin-left: 5px; }
        
        .input-group input, .input-group select {
            width: 100%; padding: 12px 15px 12px 42px;
            border: 1.5px solid #eee; border-radius: 12px;
            font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); background: #f9fbf9; }

        .btn-register {
            width: 100%; padding: 15px; background: var(--primary);
            color: white; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            margin-top: 15px; transition: 0.3s;
        }
        .btn-register:active { transform: scale(0.98); }

        .login-link { display: block; margin-top: 20px; font-size: 0.85rem; color: #666; text-decoration: none; }
        .login-link strong { color: var(--primary); }

        /* Password Strength Meter */
        .strength-meter { height: 4px; background: #eee; margin-top: 8px; border-radius: 2px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

    <div class="reg-card">
        <div class="reg-header">
            <h2>Join the Tree</h2>
            <p>Create your account to connect with the family.</p>
        </div>

        <form onsubmit="handleRegister(event)">
            <div class="input-group">
                <label>Full Name</label>
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="e.g. John Asikaburu" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="name@email.com" required>
            </div>

            <div class="input-group">
                <label>Relationship to Wisdom</label>
                <i class="fa-solid fa-people-group"></i>
                <select required style="padding-left: 42px;">
                    <option value="" disabled selected>Select relation...</option>
                    <option value="parent">Parent</option>
                    <option value="sibling">Sibling</option>
                    <option value="cousin">Cousin</option>
                    <option value="uncle_aunt">Uncle / Aunt</option>
                    <option value="other">Other Relative</option>
                </select>
            </div>

            <div class="input-group">
                <label>Create Password</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="regPass" placeholder="••••••••" required oninput="checkStrength(this.value)">
                <div class="strength-meter"><div id="strengthBar" class="strength-bar"></div></div>
            </div>

            <button type="submit" class="btn-register">Create Account</button>
        </form>

        <a href="login.html" class="login-link">Already a member? <strong>Sign In</strong></a>
    </div>

    <script>
        function checkStrength(pass) {
            const bar = document.getElementById('strengthBar');
            if (pass.length === 0) { bar.style.width = '0%'; }
            else if (pass.length < 6) { bar.style.width = '30%'; bar.style.background = '#ff4d4d'; }
            else if (pass.length < 10) { bar.style.width = '60%'; bar.style.background = '#ffd93d'; }
            else { bar.style.width = '100%'; bar.style.background = '#2d5a27'; }
        }

        function handleRegister(e) {
            e.preventDefault();
            // In a real app, you'd send this to your MariaDB
            alert("Registration successful! Welcome to the family.");
            window.location.href = 'feed.html';
        }
    </script>
</body>
</html>
