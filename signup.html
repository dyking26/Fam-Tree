<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join the Family | FAM-TREE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #2d5a27; 
            --dark: #1e3d1a; 
            --bg-overlay: rgba(30, 61, 26, 0.85); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .reg-card {
            background: rgba(255, 255, 255, 0.98);
            width: 100%; max-width: 480px;
            padding: 30px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .reg-header { text-align: center; }
        .reg-header h2 { font-weight: 800; color: var(--dark); font-size: 1.6rem; }
        .reg-header p { color: #666; font-size: 0.9rem; margin: 10px 0 20px; }

        /* --- New Mode Selector --- */
        .mode-container {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .mode-btn {
            flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 12px;
            cursor: pointer; text-align: center; transition: 0.3s;
            background: white;
        }
        .mode-btn i { display: block; margin-bottom: 5px; color: #aaa; }
        .mode-btn span { font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; }
        
        input[type="radio"]:checked + .mode-btn {
            border-color: var(--primary); background: #f0f4f0;
        }
        input[type="radio"]:checked + .mode-btn i,
        input[type="radio"]:checked + .mode-btn span { color: var(--primary); }

        /* --- Form Styling --- */
        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 38px; color: #888; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--dark); margin-bottom: 5px; margin-left: 5px; }
        
        .input-group input, .input-group select {
            width: 100%; padding: 12px 15px 12px 42px;
            border: 1.5px solid #eee; border-radius: 12px;
            font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); background: #f9fbf9; }

        /* Tree Code Area (Hidden by default) */
        #joinTreeSection { 
            display: none; background: #fffde7; padding: 15px; 
            border-radius: 15px; border: 1px dashed #fbc02d; margin-bottom: 15px;
        }

        .btn-register {
            width: 100%; padding: 15px; background: var(--primary);
            color: white; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            margin-top: 10px; transition: 0.3s;
        }

        /* --- Success Modal --- */
        #successModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 24px; text-align: center;
            max-width: 400px; width: 100%;
        }
        .invite-box {
            background: #f4f1ea; padding: 15px; border-radius: 12px;
            margin: 20px 0; font-family: monospace; font-size: 1.5rem;
            color: var(--primary); border: 2px dashed var(--primary);
            letter-spacing: 2px;
        }

        .login-link { display: block; margin-top: 20px; font-size: 0.85rem; color: #666; text-decoration: none; text-align: center;}
        .login-link strong { color: var(--primary); }
    </style>
</head>
<body>

    <div class="reg-card">
        <div class="reg-header">
            <h2>Start Your Legacy</h2>
            <p>Choose how you want to begin.</p>
        </div>

        <!-- Role Selection -->
        <div class="mode-container">
            <label style="flex:1">
                <input type="radio" name="role" value="admin" checked hidden onchange="toggleForm(this.value)">
                <div class="mode-btn">
                    <i class="fa-solid fa-tree"></i>
                    <span>Create New Tree</span>
                </div>
            </label>
            <label style="flex:1">
                <input type="radio" name="role" value="member" hidden onchange="toggleForm(this.value)">
                <div class="mode-btn">
                    <i class="fa-solid fa-link"></i>
                    <span>Join Existing</span>
                </div>
            </label>
        </div>

        <form onsubmit="handleRegister(event)">
            <!-- Join Code Input (Conditional) -->
            <div id="joinTreeSection">
                <div class="input-group">
                    <label>Tree Invitation Code</label>
                    <i class="fa-solid fa-key"></i>
                    <input type="text" id="inviteCode" placeholder="Enter code from admin">
                </div>
            </div>

            <div class="input-group">
                <label>Full Name</label>
                <i class="fa-solid fa-user"></i>
                <input type="text" id="fullName" placeholder="e.g. Wisdom Asikaburu" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="name@email.com" required>
            </div>

            <div class="input-group">
                <label>Create Password</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-register">Complete Registration</button>
        </form>

        <a href="login.html" class="login-link">Already a member? <strong>Sign In</strong></a>
    </div>

    <!-- The Success Modal for Admins -->
    <div id="successModal">
        <div class="modal-content">
            <i class="fa-solid fa-circle-check" style="font-size: 3rem; color: var(--primary);"></i>
            <h2 style="margin: 15px 0;">Tree Created!</h2>
            <p style="color: #666;">Share this code with your family members so they can join your tree:</p>
            <div class="invite-box" id="generatedCode">FAM-882-X9</div>
            <button class="btn-register" onclick="window.location.href='dashboard.html'">Go to Dashboard</button>
        </div>
    </div>

    <script>
        function toggleForm(role) {
            const joinSection = document.getElementById('joinTreeSection');
            const codeInput = document.getElementById('inviteCode');
            
            if(role === 'member') {
                joinSection.style.display = 'block';
                codeInput.required = true;
            } else {
                joinSection.style.display = 'none';
                codeInput.required = false;
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            const role = document.querySelector('input[name="role"]:checked').value;
            
            if(role === 'admin') {
                // Generate a random code for simulation
                const code = "FT-" + Math.random().toString(36).substr(2, 6).toUpperCase();
                document.getElementById('generatedCode').innerText = code;
                document.getElementById('successModal').style.display = 'flex';
            } else {
                alert("Successfully joined the tree! Redirecting...");
                window.location.href = 'dashboard.html';
            }
        }
    </script>
</body>
</html>
