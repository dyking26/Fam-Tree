<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu | FAM-TREE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Light Mode (Default) */
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #050505;
            --text-sub: #65676b;
            --border: #eeeeee;
            --primary: #2d5a27;
        }

        /* Dark Mode Colors */
        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e4e6eb;
            --text-sub: #b0b3b8;
            --border: #333333;
        }

        /* Apply variables to the body */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        /* Update your card classes to use these variables */
        .feed-post,
        .info-card,
        .login-card,
        .mobile-nav,
        .search-container {
            background-color: var(--card-bg) !important;
            border-color: var(--border) !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            padding-bottom: 90px;
        }

        /* --- Header / Profile --- */
        .menu-header {
            padding: 20px 15px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .search-circle {
            background: #e4e6eb;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-bar {
            background: var(--white);
            margin: 10px 15px;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            color: inherit;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #ddd;
        }

        .profile-info strong {
            font-size: 1rem;
            display: block;
        }

        .profile-info span {
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        /* --- Shortcut Grid --- */
        .section-title {
            padding: 15px 15px 5px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-sub);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px 15px;
        }

        .menu-tile {
            background: var(--white);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-decoration: none;
            color: inherit;
        }

        .menu-tile i {
            font-size: 1.4rem;
        }

        .menu-tile span {
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Icon Colors (Matching the FB vibe) */
        .c-green {
            color: #45bd62;
        }

        .c-blue {
            color: #1877f2;
        }

        .c-red {
            color: #f3425f;
        }

        .c-gold {
            color: #f7b928;
        }

        .c-purple {
            color: #8a3ffc;
        }

        /* --- List Items at Bottom --- */
        .list-section {
            background: var(--white);
            margin-top: 20px;
            border-top: 1px solid #ddd;
        }

        .list-item {
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f2f5;
            text-decoration: none;
            color: inherit;
        }

        .list-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .list-item i {
            color: #65676b;
        }

        .logout-btn {
            background: #e4e6eb;
            margin: 20px 15px;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- MOBILE NAV (REUSE) --- */
        .mobile-nav {
            display: flex;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            border-top: 1px solid #eee;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none;
            color: #888;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item i {
            font-size: 1.2rem;
            margin-bottom: 3px;
        }

        .nav-item span {
            font-size: 0.6rem;
            font-weight: 700;
        }

        .menu-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--card);
            border-bottom: 1px solid #eee;
        }

        /* The Switch Container */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        /* Hide default checkbox */
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* The slider track */
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        /* The white circle (knob) */
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        /* Change color when checked */
        input:checked+.slider {
            background-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(22px);
        }
    </style>
</head>

<body>

    <div class="menu-header">
        <h1>Menu</h1>
        <div class="search-circle"><i class="fa-solid fa-magnifying-glass"></i></div>
    </div>

    <a href="profile.html" class="profile-bar">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Wisdom" class="profile-img">
        <div class="profile-info">
            <strong>Asikaburu Wisdom</strong>
            <span>See your profile</span>
        </div>
    </a>

    <p class="section-title">Your shortcuts</p>

    <div class="grid-container">


        <a href="dashboard.html" class="menu-tile">
            <i class="fa-solid fa-sitemap c-green"></i>
            <span>Family Tree</span>
        </a>
        <a href="gallery.html" class="menu-tile">
            <i class="fa-solid fa-images c-blue"></i>
            <span>Gallery</span>
        </a>
        <a href="notifications.html" class="menu-tile">
            <i class="fa-solid fa-bell c-red"></i>
            <span>Alerts</span>
        </a>
        <a href="#" class="menu-tile">
            <i class="fa-solid fa-calendar-star c-gold"></i>
            <span>Events</span>
        </a>
        <a href="#" class="menu-tile">
            <i class="fa-solid fa-briefcase c-purple"></i>
            <span>Business</span>
        </a>
        <a href="#" class="menu-tile">
            <i class="fa-solid fa-shield-halved c-blue"></i>
            <span>Security</span>
        </a>
    </div>

    <div class="menu-item-row">
        <div class="menu-label">
            <i class="fa-solid fa-moon"></i>
            <span>Dark Mode</span>
        </div>

        <label class="switch">
            <input type="checkbox" id="darkModeToggle" onchange="toggleDark()">
            <span class="slider round"></span>
        </label>
    </div>

    <div class="list-section">
        <div class="list-item">
            <div class="list-item-left"><i class="fa-solid fa-circle-question"></i> Help & Support</div>
            <i class="fa-solid fa-chevron-down"></i>
        </div>
        <div class="list-item">
            <div class="list-item-left"><i class="fa-solid fa-gear"></i> Settings & Privacy</div>
            <i class="fa-solid fa-chevron-down"></i>
        </div>
    </div>

    <div class="logout-btn">Log Out</div>

    <nav class="mobile-nav">
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-sitemap"></i><span>Tree</span></a>
        <a href="feed.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Feed</span></a>
        <a href="chat.html" class="nav-item"><i class="fa-solid fa-comment-dots"></i><span>Chat</span></a>
        <a href="notification.html" class="nav-item"><i class="fa-solid fa-bell"></i><span>Alerts</span></a>
        <a href="menu.html" class="nav-item active"><i class="fa-solid fa-bars"></i><span>Menu</span></a>
    </nav>

</body>

<script>
    // 1. When the page loads, check if Dark Mode was already ON
    document.addEventListener("DOMContentLoaded", () => {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.body.classList.add("dark-mode");
            document.getElementById("darkModeToggle").checked = true;
        }
    });

    // 2. The function that runs when you click the toggle
    function toggleDark() {
        const body = document.body;
        const isDark = body.classList.toggle("dark-mode");

        // Save the choice in the browser's memory
        localStorage.setItem("theme", isDark ? "dark" : "light");
    }
</script>

</html>
