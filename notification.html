<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAM-TREE | Alerts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Light Mode (Default) */
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #050505;
            --text-sub: #65676b;
            --border: #eeeeee;
            --primary: #2d5a27;
        }

        /* Dark Mode Colors */
        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e4e6eb;
            --text-sub: #b0b3b8;
            --border: #333333;
        }

        /* Apply variables to the body */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        /* Update your card classes to use these variables */
        .feed-post,
        .info-card,
        .login-card,
        .mobile-nav,
        .search-container {
            background-color: var(--card-bg) !important;
            border-color: var(--border) !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 80px;
        }

        /* Header */
        .notif-header {
            background: white;
            padding: 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .notif-header h2 {
            font-size: 1.2rem;
            color: var(--primary);
        }

        .mark-read {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        /* Notification List */
        .notif-list {
            display: flex;
            flex-direction: column;
        }

        .notif-item {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            gap: 12px;
            text-decoration: none;
            color: inherit;
            transition: background 0.2s;
        }

        .notif-item.unread {
            background: var(--unread-bg);
            border-left: 4px solid var(--primary);
        }

        .notif-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: #eee;
        }

        .notif-icon img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .notif-content {
            flex: 1;
        }

        .notif-content p {
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .notif-content p strong {
            color: #000;
        }

        .notif-content span {
            font-size: 0.75rem;
            color: #999;
        }

        /* Badge for specific types */
        .type-tag {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            float: right;
            text-transform: uppercase;
            font-weight: 800;
        }

        .tag-tree {
            background: #e3f2fd;
            color: #1976d2;
        }

        .tag-bday {
            background: #fff3e0;
            color: #ef6c00;
        }

        /* --- MOBILE NAV (Reuse from previous step) --- */
        .mobile-nav {
            display: flex;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            border-top: 1px solid #eee;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none;
            color: #888;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item i {
            font-size: 1.2rem;
            margin-bottom: 3px;
        }

        .nav-item span {
            font-size: 0.6rem;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <header class="notif-header">
        <h2>Notifications</h2>
        <a href="#" class="mark-read">Mark all as read</a>
    </header>

    <main class="notif-list">

        <!-- Birthday Notification (Today!) -->
        <a href="feed.html" class="notif-item unread">
            <div class="notif-icon" style="background: #ffd70033;">
                <i class="fa-solid fa-cake-candles" style="color: #ef6c00;"></i>
            </div>
            <div class="notif-content">
                <span class="type-tag tag-bday">Today</span>
                <p>It's <strong>Sister Grace's</strong> birthday! Send her a wish on the Family Feed. 🎂</p>
                <span>2 hours ago</span>
            </div>
        </a>

        <!-- Tree Update -->
        <a href="dashboard.html" class="notif-item unread">
            <div class="notif-icon">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Michael">
            </div>
            <div class="notif-content">
                <span class="type-tag tag-tree">Tree Update</span>
                <p><strong>Dad Michael</strong> added a new relative: <strong>Aunt Martha</strong>.</p>
                <span>5 hours ago</span>
            </div>
        </a>

        <!-- Feed Comment -->
        <a href="feed.html" class="notif-item">
            <div class="notif-icon">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah">
            </div>
            <div class="notif-content">
                <p><strong>Mom Sarah</strong> commented on your photo: "This is a beautiful memory!"</p>
                <span>Yesterday</span>
            </div>
        </a>

    </main>

    <!-- Bottom Nav -->
    <nav class="mobile-nav">
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-sitemap"></i><span>Tree</span></a>
        <a href="feed.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Feed</span></a>
        <a href="chat.html" class="nav-item"><i class="fa-solid fa-comment-dots"></i><span>Chat</span></a>
        <a href="notifications.html" class="nav-item active"><i class="fa-solid fa-bell"></i><span>Alerts</span></a>
        <a href="menu.html" class="nav-item"><i class="fa-solid fa-bars"></i><span>Menu</span></a>
    </nav>

</body>

</html>
