<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search | FAM-TREE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Light Mode (Default) */
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #050505;
            --text-sub: #65676b;
            --border: #eeeeee;
            --primary: #2d5a27;
        }

        /* Dark Mode Colors */
        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e4e6eb;
            --text-sub: #b0b3b8;
            --border: #333333;
        }

        /* Apply variables to the body */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        /* Update your card classes to use these variables */
        .feed-post,
        .info-card,
        .login-card,
        .mobile-nav,
        .search-container {
            background-color: var(--card-bg) !important;
            border-color: var(--border) !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            padding-bottom: 80px;
        }

        /* --- Search Header --- */
        .search-container {
            padding: 15px;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }

        .search-bar-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-bar-wrapper i {
            position: absolute;
            left: 15px;
            color: #888;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border-radius: 12px;
            border: none;
            background: var(--light);
            font-size: 1rem;
            outline: none;
        }

        /* --- Section Titles --- */
        .section-header {
            padding: 20px 15px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h3 {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .clear-btn {
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- Result Items --- */
        .result-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            gap: 15px;
            transition: background 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .result-item:active {
            background: #f9f9f9;
        }

        .result-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .result-info strong {
            display: block;
            font-size: 1rem;
        }

        .result-info span {
            font-size: 0.8rem;
            color: #888;
        }

        /* --- Tags/Quick Filters --- */
        .quick-filters {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filter-tag {
            padding: 6px 15px;
            background: #e8f5e9;
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        /* --- Nav --- */
        .mobile-nav {
            display: flex;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            border-top: 1px solid #eee;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none;
            color: #888;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .nav-item.active {
            color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="search-container">
        <div class="search-bar-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" class="search-input" placeholder="Search relatives, photos, or events..."
                onkeyup="filterResults(this.value)">
        </div>
    </div>

    <div class="quick-filters">
        <div class="filter-tag">#Elders</div>
        <div class="filter-tag">#Grandkids</div>
        <div class="filter-tag">#AbaBranch</div>
        <div class="filter-tag">#Weddings</div>
    </div>

    <div id="recent-section">
        <div class="section-header">
            <h3>Recent Searches</h3>
            <span class="clear-btn">Clear All</span>
        </div>

        <a href="profile.html" class="result-item">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Peter" class="result-avatar">
            <div class="result-info">
                <strong>Uncle Peter Asikaburu</strong>
                <span>Lagos Branch • Elder</span>
            </div>
        </a>

        <a href="gallery.html" class="result-item">
            <div class="result-avatar"
                style="background: #ddd; display: flex; align-items: center; justify-content: center;">
                <i class="fa-solid fa-images" style="color: #666;"></i>
            </div>
            <div class="result-info">
                <strong>Christmas 2024 Album</strong>
                <span>42 Photos • Shared by Mom</span>
            </div>
        </a>
    </div>

    <div id="suggestions-section">
        <div class="section-header">
            <h3>Suggested Relatives</h3>
        </div>

        <div class="result-item">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Joy" class="result-avatar">
            <div class="result-info">
                <strong>Cousin Joy</strong>
                <span>New Member • London</span>
            </div>
        </div>
    </div>

    <nav class="mobile-nav">
        <a href="feed.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Feed</span></a>
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-sitemap"></i><span>Tree</span></a>
        <a href="search.html" class="nav-item active"><i
                class="fa-solid fa-magnifying-glass"></i><span>Search</span></a>
        <a href="gallery.html" class="nav-item"><i class="fa-solid fa-images"></i><span>Photos</span></a>
        <a href="menu.html" class="nav-item"><i class="fa-solid fa-bars"></i><span>Menu</span></a>
    </nav>

    <script>
        function filterResults(query) {
            // Logic for real-time filtering would go here
            console.log("Searching for: " + query);
        }
    </script>
</body>

</html>
