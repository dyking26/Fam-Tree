<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | Wisdom Asikaburu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Light Mode (Default) */
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #050505;
            --text-sub: #65676b;
            --border: #eeeeee;
            --primary: #2d5a27;
        }

        /* Dark Mode Colors */
        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e4e6eb;
            --text-sub: #b0b3b8;
            --border: #333333;
        }

        /* Apply variables to the body */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        /* Update your card classes to use these variables */
        .feed-post,
        .info-card,
        .login-card,
        .mobile-nav,
        .search-container {
            background-color: var(--card-bg) !important;
            border-color: var(--border) !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            padding-bottom: 80px;
        }

        /* --- Profile Header --- */
        .cover-photo {
            height: 180px;
            background: linear-gradient(to bottom, #4a7c44, #2d5a27);
            width: 100%;
            position: relative;
        }

        .profile-main {
            background: var(--white);
            padding: 0 15px 20px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .profile-avatar-wrapper {
            position: relative;
            margin-top: -60px;
            display: inline-block;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid var(--white);
            background: #eee;
        }

        .profile-names h1 {
            font-size: 1.5rem;
            margin-top: 10px;
        }

        .family-role {
            color: var(--primary);
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: block;
        }

        .user-bio {
            font-size: 0.9rem;
            color: #666;
            margin: 10px 0;
            line-height: 1.4;
        }

        /* --- Action Buttons --- */
        .profile-actions {
            display: flex;
            gap: 10px;
            padding: 15px 0;
            justify-content: center;
        }

        .btn-edit {
            background: #e4e6eb;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            font-weight: 600;
            flex: 1;
        }

        .btn-tree-view {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            font-weight: 600;
            flex: 1;
        }

        /* --- Info Grid --- */
        .info-card {
            background: var(--white);
            margin-top: 10px;
            padding: 15px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .info-item i {
            width: 20px;
            color: #888;
            text-align: center;
        }

        /* --- Photo Gallery --- */
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .gallery-grid img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 4px;
        }

        /* --- MOBILE NAV (REUSE) --- */
        .mobile-nav {
            display: flex;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            border-top: 1px solid #eee;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none;
            color: #888;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .nav-item.active {
            color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="cover-photo"></div>

    <div class="profile-main">
        <div class="profile-avatar-wrapper">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Wisdom" class="profile-avatar">
        </div>
        <div class="profile-names">
            <h1>Asikaburu Wisdom</h1>
            <span class="family-role">First Son of Michael & Sarah</span>
        </div>
        <p class="user-bio">Cybersecurity Professional | Tech Enthusiast | Building the future of the Asikaburu legacy.
        </p>

        <div class="profile-actions">
            <button class="btn-tree-view" onclick="window.location.href='dashboard.html'">View in Tree</button>
            <button class="btn-edit">Edit Profile</button>
        </div>
    </div>

    <div class="info-card">
        <div class="info-item">
            <i class="fa-solid fa-briefcase"></i>
            <span>Cybersecurity Professional at <strong>Self-Employed</strong></span>
        </div>
        <div class="info-item">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>Studied Frontend Web Design</span>
        </div>
        <div class="info-item">
            <i class="fa-solid fa-location-dot"></i>
            <span>Lives in <strong>Aba, Nigeria</strong></span>
        </div>
        <div class="info-item">
            <i class="fa-solid fa-cake-candles"></i>
            <span>Birthday: <strong>October 15th</strong></span>
        </div>
    </div>

    <div class="info-card">
        <div class="gallery-header">
            <strong>Photos</strong>
            <a href="#" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">See All</a>
        </div>
        <div class="gallery-grid">
            <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200">
            <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=200">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200">
            <img src="https://images.unsplash.com/photo-1492562080023-ab3dbdf5bb3d?w=200">
            <img src="https://images.unsplash.com/photo-1531427186611-ecfd6d936c79?w=200">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200">
        </div>
    </div>

    <nav class="mobile-nav">
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-sitemap"></i><span>Tree</span></a>
        <a href="feed.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Feed</span></a>
        <a href="chat.html" class="nav-item"><i class="fa-solid fa-comment-dots"></i><span>Chat</span></a>
        <a href="notifications.html" class="nav-item"><i class="fa-solid fa-bell"></i><span>Alerts</span></a>
        <a href="menu.html" class="nav-item active"><i class="fa-solid fa-bars"></i><span>Menu</span></a>
    </nav>

</body>

</html>
